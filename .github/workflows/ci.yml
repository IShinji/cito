name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, experimental: false }
          - { os: macos-14, experimental: false }
          - { os: windows-latest, experimental: false }
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
        if: matrix.os == 'ubuntu-latest'
      - run: cargo clippy --all-targets -- -D warnings
        if: matrix.os == 'ubuntu-latest'
      - run: cargo test

  pytest-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - run: cargo build --release
      - name: Differential check on fixtures
        run: |
          uv run --no-project --with pytest scripts/diff_collect.py tests/fixtures/basic
          uv run --no-project --with pytest scripts/diff_collect.py tests/fixtures/configured
      - name: Differential check with plugins (asyncio, hypothesis)
        run: |
          uv run --no-project --with pytest --with pytest-asyncio --with hypothesis \
            scripts/diff_collect.py tests/fixtures/plugins
      - name: Differential check on a generated corpus
        run: |
          python3 bench/gen_corpus.py --files 60 --tests 10 --out /tmp/corpus
          uv run --no-project --with pytest scripts/diff_collect.py /tmp/corpus
      - name: Differential check against pytest's own test suite
        run: |
          git clone --depth 1 --branch 9.1.1 https://github.com/pytest-dev/pytest /tmp/pytest-repo
          uv venv /tmp/ptv
          uv pip install --python /tmp/ptv/bin/python "pytest==9.1.1" \
            xmlschema pygments attrs mock setuptools hypothesis
          python3 scripts/diff_collect.py /tmp/pytest-repo \
            --python /tmp/ptv/bin/python --ignore-missing test_doctest.txt
