# Builds wheels for the major platforms and publishes to PyPI on tag push.
#
# Before pushing the first tag: configure a PyPI Trusted Publisher for this
# repository (workflow file `release.yml`, environment `pypi`) at
# https://pypi.org/manage/account/publishing/ — no token secrets needed.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  check-version:
    name: tag matches Cargo.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)"
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match Cargo.toml version $version" >&2
            exit 1
          fi

  wheels:
    name: wheel ${{ matrix.platform.target }}
    needs: [check-version]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { runner: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { runner: macos-14, target: aarch64-apple-darwin }
          - { runner: macos-14, target: x86_64-apple-darwin }
          - { runner: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform.target }}
          path: dist

  sdist:
    needs: [check-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
